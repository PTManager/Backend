# 운영 프로파일. 구동: SPRING_PROFILES_ACTIVE=prod
# 스키마는 Flyway(V1__init.sql)가 소유하며, JPA는 검증/생성하지 않는다(ddl-auto=none).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}            # 예: jdbc:postgresql://<RDS엔드포인트>:5432/ptmanager
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 동시 요청 시 커넥션 풀 고갈로 타임아웃/실패나는 것을 완화.
      # (RDS max_connections 여유 범위 내에서 조정. 인스턴스 확장 시 함께 늘릴 것)
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 10000              # 풀 대기 최대 10초
      max-lifetime: 1800000                  # 커넥션 최대 수명 30분
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  h2:
    console:
      enabled: false
