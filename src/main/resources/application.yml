spring:
  application:
    name: ptmanager-backend
  datasource:
    url: jdbc:h2:mem:ptmanager;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

jwt:
  # 운영에서는 반드시 환경변수 JWT_SECRET 로 재정의할 것 (HS256: 최소 32바이트)
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-production-0123456789abcdef}
  access-token-expiration-ms: 3600000        # 1시간
  refresh-token-expiration-ms: 1209600000    # 14일

management:
  endpoints:
    web:
      exposure:
        include: health,info

# To use PostgreSQL instead of the embedded H2 database, override the
# datasource (e.g. via SPRING_DATASOURCE_URL) and add the
# org.postgresql:postgresql driver. JPA entities are DB-agnostic.
